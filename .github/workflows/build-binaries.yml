name: Build binaries

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux
            arch: x86_64
          - os: windows-latest
            platform: windows
            arch: x86_64
          - os: macos-latest
            platform: macos
            arch: arm64
          - os: macos-13
            platform: macos
            arch: x86_64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install -U pip
          python -m pip install -r requirements.txt pyinstaller pillow

      - name: Build binary
        run: python build_binary.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: vklauncher-${{ matrix.platform }}-${{ matrix.arch }}
          path: dist/vklauncher-${{ matrix.platform }}-${{ matrix.arch }}.zip
          if-no-files-found: error

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Stage release assets
        run: |
          mkdir -p release-assets
          cp artifacts/*.zip release-assets/
          cp install.sh uninstall.sh install.ps1 uninstall.ps1 release-assets/
          chmod +x release-assets/install.sh release-assets/uninstall.sh

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release-assets/*
          generate_release_notes: true
          body: |
            ## Install

            **Linux / macOS**
            ```bash
            curl -fsSL https://raw.githubusercontent.com/vk1111111/vklauncher/main/install.sh | bash
            ```

            **Windows (PowerShell)**
            ```powershell
            irm https://raw.githubusercontent.com/vk1111111/vklauncher/main/install.ps1 | iex
            ```
